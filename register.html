<!DOCTYPE html>
<html>

<head>
    <title>Register</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .box {
            width: 500px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h2 {
            text-align: center;
        }

        .exam {
            text-align: center;
            margin-bottom: 20px;
            color: #ffd369;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 15px;
        }

        input:focus,
        select:focus {
            transform: scale(1.03);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        select {
            cursor: pointer;
        }

        input[type="file"] {
            background: white;
            color: black;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
        }

        button:hover {
            transform: scale(1.05);
        }

        .leave {
            background: linear-gradient(45deg, #ff4b5c, #c70039);
        }

        button.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: white;
            color: black;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            width: 300px;
        }
    </style>
</head>

<body>

    <div class="box">

        <h2>📝 Exam Registration</h2>
        <p id="examName" class="exam"></p>

        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email">
        <input type="number" id="age" placeholder="Age">
        <input type="tel" id="mobile" placeholder="Mobile Number">
        <input type="date" id="dob">

        <select id="gender">
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select>

        <!-- EXAM CENTRE DROPDOWN -->
        <select id="centre" onchange="setAddress()">
            <option value="">Select Exam Centre</option>
            <option value="ABC College">ABC College</option>
            <option value="XYZ Institute">XYZ Institute</option>
            <option value="SRM University">SRM University</option>
        </select>

        <!-- AUTO ADDRESS -->
        <input type="text" id="address" placeholder="Centre Address" readonly>

        <select id="status">
            <option value="">Select Status</option>
            <option>12th Completed</option>
            <option>Graduated</option>
            <option>Post Graduated</option>
        </select>

        <!-- CATEGORY -->
        <select id="category" style="display:none;">
            <option value="">Select GOVT Category</option>
            <option>Group 1</option>
            <option>Group 2</option>
            <option>Group 4</option>
            <option>Group 4A</option>
        </select>

        <select id="jeeCategory" style="display:none;">
            <option value="">Select JEE Category</option>
            <option>Main</option>
            <option>Advance</option>
        </select>

        <select id="neetCategory" style="display:none;">
            <option value="">Select NEET Category</option>
            <option>Main</option>
            <option>Advance</option>
        </select>

        <input type="file" id="photo" accept="image/*" title="Upload your photo">

        <button id="submitBtn" onclick="register()">Submit</button>
        <button class="leave" onclick="leave()">Cancel</button>

    </div>

    <!-- LOADING OVERLAY -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Processing...</div>
    </div>

    <!-- MODAL -->
    <div id="modal" class="modal">
        <div class="modal-box">
            <h3 id="modalTitle"></h3>
            <p id="modalMessage"></p>
            <button onclick="closeModal()">OK</button>
        </div>
    </div>

    <script>

        /* CHECK LOGIN SESSION */
        let currentUser = JSON.parse(localStorage.getItem("currentUser"));
        if (!currentUser) {
            window.location = "index.html";
        }

        let isSubmitting = false;
        window.addEventListener('beforeunload', (e) => {
            if (isSubmitting) {
                e.preventDefault();
                e.returnValue = 'Registration is in progress. Please wait!';
            }
        });

        let exam = localStorage.getItem("exam");
        document.getElementById("examName").innerText = "Exam: " + exam;

        /* SHOW CATEGORY */
        if (exam == "GOVT") {
            document.getElementById("category").style.display = "block";
        }
        else if (exam == "JEE") {
            document.getElementById("jeeCategory").style.display = "block";
        }
        else if (exam == "NEET") {
            document.getElementById("neetCategory").style.display = "block";
        }

        /* AUTO ADDRESS */
        function setAddress() {
            let centre = document.getElementById("centre").value;
            let address = document.getElementById("address");

            if (centre === "ABC College") {
                address.value = "Chennai, Tamil Nadu";
            }
            else if (centre === "XYZ Institute") {
                address.value = "Bangalore, Karnataka";
            }
            else if (centre === "SRM University") {
                address.value = "Kattankulathur, Chennai";
            }
            else {
                address.value = "";
            }
        }

        /* REGISTER */
        async function register() {

            if (isSubmitting) return;
            isSubmitting = true;

            let overlay = document.getElementById("loadingOverlay");
            overlay.classList.add("active");

            let btn = document.getElementById("submitBtn");
            btn.classList.add("loading");
            btn.innerText = "Processing...";

            let photoInput = document.getElementById("photo");

            /* CHECK IMAGE FIRST - COMPREHENSIVE VALIDATION */
            try {
                if (photoInput.files.length == 0) {
                    return fail("Upload photo");
                }

                let file = photoInput.files[0];
                
                if (!file) {
                    return fail("No file selected. Please try again.");
                }

                if (!file.type) {
                    return fail("Unable to determine file type. Please try a different image.");
                }

                if (!file.type.startsWith('image/')) {
                    return fail("Please upload a valid image file (JPG, PNG, etc.)");
                }

                if (file.size === 0) {
                    return fail("Image file is empty. Please upload a valid image.");
                }

                if (file.size > 10 * 1024 * 1024) {
                    return fail("Image file too large. Maximum size is 10MB.");
                }

                // Helper function to read file as Data URL
                function readFileAsDataURL(file) {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        let timer = setTimeout(() => {
                            reader.abort();
                            reject(new Error('File reading timed out. Please try a smaller image file.'));
                        }, 15000);

                        reader.onload = () => {
                            clearTimeout(timer);
                            resolve(reader.result);
                        };
                        reader.onerror = () => {
                            clearTimeout(timer);
                            reject(new Error('Error reading photo'));
                        };
                        reader.onabort = () => {
                            clearTimeout(timer);
                            reject(new Error('File read aborted. Please try again.'));
                        };
                        reader.readAsDataURL(file);
                    });
                }

                let photo = await readFileAsDataURL(file);

                if (!photo) {
                    return fail("Photo data is empty. Please try another image.");
                }

                if (!photo.startsWith('data:image/')) {
                    return fail("Invalid image file. Please upload a valid image (JPG, PNG, etc.).");
                }

                // Validate that the image can be loaded
                let imageValid = await new Promise((resolve, reject) => {
                    let img = new Image();
                    let timeout = setTimeout(() => {
                        reject(new Error('Image validation timed out'));
                    }, 5000);
                    
                    img.onload = () => {
                        clearTimeout(timeout);
                        resolve(true);
                    };
                    img.onerror = () => {
                        clearTimeout(timeout);
                        reject(new Error('Invalid or corrupted image file'));
                    };
                    img.src = photo;
                });

                /* NOW CHECK OTHER FORM FIELDS */
                let name = document.getElementById("name").value.trim();
                let email = document.getElementById("email").value.trim();
                let age = document.getElementById("age").value;
                let mobile = document.getElementById("mobile").value.trim();
                let status = document.getElementById("status").value;
                let dob = document.getElementById("dob").value;
                let gender = document.getElementById("gender").value;
                let centre = document.getElementById("centre").value;
                let address = document.getElementById("address").value;

                if (!name || !email || !age || !mobile || !status || !centre) {
                    return fail("Fill all fields");
                }

                if (name.length < 3) {
                    return fail("Name must be at least 3 characters");
                }

                if (!email.includes("@")) {
                    return fail("Enter a valid email address");
                }

                if (age < 18 || age > 100) {
                    return fail("Age must be between 18 and 100");
                }

                if (mobile.length < 10) {
                    return fail("Mobile number must be at least 10 digits");
                }

                if (!dob) {
                    return fail("Please select your date of birth");
                }

                if (!gender) {
                    return fail("Please select your gender");
                }

                let category = "";

                if (exam == "GOVT") {
                    category = document.getElementById("category").value;
                    if (!category) return fail("Select GOVT category");
                }
                else if (exam == "JEE") {
                    category = document.getElementById("jeeCategory").value;
                    if (!category) return fail("Select JEE category");
                }
                else if (exam == "NEET") {
                    category = document.getElementById("neetCategory").value;
                    if (!category) return fail("Select NEET category");
                }

                let data;
                try {
                    data = JSON.parse(localStorage.getItem("data")) || [];
                } catch (parseError) {
                    console.warn('Corrupted data storage, resetting data array.', parseError);
                    data = [];
                }

                let userData = {
                    name, email, exam, age, mobile, status, category, photo,
                    dob, gender, centre, address
                };

                data.push(userData);

                localStorage.setItem("data", JSON.stringify(data));
                localStorage.setItem("currentUser", JSON.stringify(userData));

                showSuccess("Registered Successfully!");
                isSubmitting = false;

            } catch (error) {
                isSubmitting = false;
                console.error('Register error:', error);
                resetBtn();

                if (error.message.includes('timed out')) {
                    fail(error.message);
                } else if (error.message.includes('Invalid or corrupted')) {
                    fail("Invalid or corrupted image file. Please upload a valid image.");
                } else if (error.message.includes('aborted')) {
                    fail("Photo upload was interrupted. Please try again.");
                } else if (error.message.includes('not allowed')) {
                    fail("File access denied. Please try a different image.");
                } else if (error.message.includes('NotReadableError')) {
                    fail("Cannot read the selected file. It may be in use or inaccessible.");
                } else if (error instanceof TypeError) {
                    fail("An unexpected type error occurred. Please refresh and try again.");
                } else if (error instanceof SyntaxError) {
                    fail("Data format error. Please refresh the page and try again.");
                } else if (error instanceof RangeError) {
                    fail("The photo data is too large. Please try a smaller image.");
                } else {
                    fail("An unexpected error occurred: " + error.message);
                }
            }
        }

        /* ERROR */
        function showError(msg) {
            resetBtn(); // already correct
            document.getElementById("modalTitle").innerText = "Error";
            document.getElementById("modalMessage").innerText = msg;
            document.getElementById("modal").style.display = "flex";
        }

        /* SUCCESS */
        function showSuccess(msg) {
            resetBtn(); // ✅ FIX ADDED (important)
            document.getElementById("modalTitle").innerText = "Success";
            document.getElementById("modalMessage").innerText = msg;
            document.getElementById("modal").style.display = "flex";
        }

        function closeModal() {
            let overlay = document.getElementById("loadingOverlay");
            overlay.classList.remove("active");
            document.getElementById("modal").style.display = "none";
            if (document.getElementById("modalTitle").innerText == "Success") {
                setTimeout(() => {
                    window.location = "student.html";
                }, 500);
            }
            resetBtn();
        }

        function resetBtn() {
            let btn = document.getElementById("submitBtn");
            btn.classList.remove("loading");
            btn.innerText = "Submit";
        }

        function leave() {
            window.location = "student.html";
        }

    </script>

</body>

</html>
